<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FitVision — Live Shopping + AR Try-On</title>
  <meta name="description" content="FitVision: Live video shopping with AI-powered AR clothing try-on. Sellers stream live, buyers try on clothes in real-time.">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-container">
      <div class="auth-header">
        <span class="logo logo-lg">FitVision</span>
        <p>Live shopping, try before you buy</p>
      </div>

      <!-- Tabs -->
      <div class="tabs" id="authTabs">
        <button class="tab active" data-tab="login">Login</button>
        <button class="tab" data-tab="register">Register</button>
      </div>

      <!-- Login Form -->
      <div id="loginForm" class="auth-form" style="margin-top:20px;">
        <div class="input-group">
          <label>Email</label>
          <input type="email" class="input" id="loginEmail" placeholder="you@email.com" autocomplete="email">
        </div>
        <div class="input-group">
          <label>Password</label>
          <input type="password" class="input" id="loginPassword" placeholder="Enter password" autocomplete="current-password">
        </div>
        <div class="auth-error" id="loginError"></div>
        <button class="btn btn-primary btn-lg" id="loginBtn" style="width:100%;">Login</button>
      </div>

      <!-- Register Form -->
      <div id="registerForm" class="auth-form hidden" style="margin-top:20px;">
        <div class="input-group">
          <label>Full Name</label>
          <input type="text" class="input" id="regName" placeholder="Your name" autocomplete="name">
        </div>
        <div class="input-group">
          <label>Email</label>
          <input type="email" class="input" id="regEmail" placeholder="you@email.com" autocomplete="email">
        </div>
        <div class="input-group">
          <label>Password</label>
          <input type="password" class="input" id="regPassword" placeholder="Min 6 characters" autocomplete="new-password">
        </div>
        <div class="input-group">
          <label>I am a...</label>
          <div class="role-cards" id="roleCards">
            <div class="role-card" data-role="seller">
              <div class="role-icon">📱</div>
              <div class="role-label">Seller</div>
              <div class="role-desc">Stream live from your mobile</div>
            </div>
            <div class="role-card" data-role="buyer">
              <div class="role-icon">💻</div>
              <div class="role-label">Buyer</div>
              <div class="role-desc">Try clothes with AR on desktop</div>
            </div>
          </div>
        </div>
        <div class="auth-error" id="regError"></div>
        <button class="btn btn-primary btn-lg" id="regBtn" style="width:100%;" disabled>Create Account</button>
      </div>

      <div class="auth-footer">
        <div class="feature-chips">
          <span class="chip">🎥 Live Video</span>
          <span class="chip">👕 AR Try-On</span>
          <span class="chip">🤖 AI Powered</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <script type="module">
    import { registerUser, loginUser, checkAuth } from './js/auth.js';

    let selectedRole = null;

    // Check if already logged in
    checkAuth().then(({ role }) => {
      window.location.href = role === 'seller' ? 'seller.html' : 'buyer.html';
    }).catch(() => { /* Not logged in, stay on this page */ });

    // Tab switching
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        const target = tab.dataset.tab;
        document.getElementById('loginForm').classList.toggle('hidden', target !== 'login');
        document.getElementById('registerForm').classList.toggle('hidden', target !== 'register');
      });
    });

    // Role card selection
    document.querySelectorAll('.role-card').forEach(card => {
      card.addEventListener('click', () => {
        document.querySelectorAll('.role-card').forEach(c => c.classList.remove('selected'));
        card.classList.add('selected');
        selectedRole = card.dataset.role;
        document.getElementById('regBtn').disabled = false;
      });
    });

    // Login
    document.getElementById('loginBtn').addEventListener('click', async () => {
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      const errEl = document.getElementById('loginError');
      errEl.textContent = '';

      if (!email || !password) { errEl.textContent = 'Fill in all fields'; return; }

      const btn = document.getElementById('loginBtn');
      btn.disabled = true; btn.textContent = 'Logging in...';

      const result = await loginUser(email, password);
      if (result.success) {
        showToast('Welcome back!', 'success');
        setTimeout(() => {
          window.location.href = result.role === 'seller' ? 'seller.html' : 'buyer.html';
        }, 500);
      } else {
        errEl.textContent = result.error;
        btn.disabled = false; btn.textContent = 'Login';
      }
    });

    // Register
    document.getElementById('regBtn').addEventListener('click', async () => {
      const name = document.getElementById('regName').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const password = document.getElementById('regPassword').value;
      const errEl = document.getElementById('regError');
      errEl.textContent = '';

      if (!name || !email || !password) { errEl.textContent = 'Fill in all fields'; return; }
      if (!selectedRole) { errEl.textContent = 'Select a role'; return; }

      const btn = document.getElementById('regBtn');
      btn.disabled = true; btn.textContent = 'Creating account...';

      const result = await registerUser(email, password, name, selectedRole);
      if (result.success) {
        showToast('Account created!', 'success');
        setTimeout(() => {
          window.location.href = result.role === 'seller' ? 'seller.html' : 'buyer.html';
        }, 500);
      } else {
        errEl.textContent = result.error;
        btn.disabled = false; btn.textContent = 'Create Account';
      }
    });

    // Enter key support
    document.getElementById('loginPassword').addEventListener('keypress', e => {
      if (e.key === 'Enter') document.getElementById('loginBtn').click();
    });
    document.getElementById('regPassword').addEventListener('keypress', e => {
      if (e.key === 'Enter') document.getElementById('regBtn').click();
    });

    function showToast(msg, type) {
      const c = document.getElementById('toastContainer');
      const t = document.createElement('div');
      t.className = `toast ${type ? 'toast-' + type : ''}`;
      t.textContent = msg;
      c.appendChild(t);
      setTimeout(() => t.remove(), 3000);
    }
  </script>
</body>
</html>
