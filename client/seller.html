<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>FitVision — Seller Dashboard</title>
  <meta name="description" content="FitVision Seller: Stream live, capture garments, and share with buyers.">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/socket.io-client@4.7.2/dist/socket.io.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/body-segmentation@1.0.1/dist/body-segmentation.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.js"></script>
  <style>
    .seller-main { padding: 16px; max-width: 500px; margin: 0 auto; padding-top: 70px; }
    .room-box { text-align: center; margin-bottom: 16px; }
    .room-code { font-family: 'Syne', monospace; font-size: 2rem; font-weight: 800; letter-spacing: 6px; color: var(--accent); }
    .room-link { font-size: 0.75rem; color: var(--muted); word-break: break-all; margin-top: 4px; }
    .camera-section { margin-bottom: 16px; }
    .cam-controls { display: flex; gap: 8px; justify-content: center; margin-top: 10px; }
    .capture-area { margin-top: 16px; }
    .thumbnail-strip { display: flex; gap: 6px; overflow-x: auto; padding: 8px 0; }
    .thumbnail-strip img { width: 60px; height: 60px; object-fit: cover; border-radius: var(--radius-sm); border: 1px solid var(--border); }
    .stats-row { display: flex; gap: 16px; justify-content: center; margin: 12px 0; }
    .buyer-preview { margin-top: 16px; }
    .buyer-preview .video-container { aspect-ratio: 4/3; max-height: 160px; }
  </style>
</head>
<body>
  <!-- Loading Overlay -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="logo logo-lg">FitVision</div>
    <div class="spinner spinner-lg"></div>
    <div class="loading-text" id="loadingText">Loading AI models...</div>
    <div class="loading-progress">
      <div class="loading-progress-bar" id="progressBar" style="width:0%"></div>
    </div>
  </div>

  <!-- Header -->
  <header class="header" style="position:fixed;top:0;left:0;right:0;z-index:500;">
    <div class="header-left">
      <span class="logo">FitVision</span>
      <span class="badge badge-accent">Seller</span>
    </div>
    <div class="header-right">
      <span class="user-info" id="sellerName">Seller</span>
      <button class="btn btn-ghost btn-sm" id="logoutBtn">Logout</button>
    </div>
  </header>

  <main class="seller-main">
    <!-- Room Section -->
    <div class="card room-box" id="roomSection">
      <div class="section-title">Your Room</div>
      <div id="noRoom">
        <p style="color:var(--muted);margin-bottom:12px;">Create a room to start streaming</p>
        <button class="btn btn-primary btn-lg" id="createRoomBtn">🎥 Go Live</button>
      </div>
      <div id="roomInfo" class="hidden">
        <div class="room-code" id="roomCode"></div>
        <div class="room-link" id="roomLink"></div>
        <div style="display:flex;gap:6px;justify-content:center;margin-top:10px;">
          <button class="btn btn-secondary btn-sm" id="copyCodeBtn">📋 Copy Code</button>
          <button class="btn btn-secondary btn-sm" id="copyLinkBtn">🔗 Copy Link</button>
          <button class="btn btn-danger btn-sm" id="endRoomBtn">End</button>
        </div>
        <div id="connStatus" style="margin-top:8px;display:flex;align-items:center;justify-content:center;gap:6px;">
          <span class="status-dot" id="connDot"></span>
          <span class="text-sm text-muted" id="connText">Waiting for buyer...</span>
        </div>
      </div>
    </div>

    <!-- Camera -->
    <div class="camera-section">
      <div class="section-title">Camera</div>
      <div class="video-container">
        <video id="localVideo" autoplay playsinline muted></video>
      </div>
      <div class="cam-controls">
        <button class="control-btn active" id="flipBtn" title="Flip Camera">🔄</button>
        <button class="control-btn active" id="micBtn" title="Toggle Mic">🎤</button>
        <button class="control-btn" id="captureBtn" title="Capture Garment" disabled>📸</button>
      </div>
    </div>

    <!-- Capture -->
    <div class="capture-area">
      <div class="section-title" style="display:flex;justify-content:space-between;">
        <span>Captured Garments</span>
        <span class="badge badge-accent" id="capCount">0</span>
      </div>
      <div class="thumbnail-strip" id="thumbStrip">
        <p class="text-sm text-muted" id="noCapMsg" style="padding:10px;">Garments you capture will appear here</p>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-item"><div class="stat-value" id="statDuration">0:00</div><div class="stat-label">Duration</div></div>
      <div class="stat-item"><div class="stat-value" id="statGarments">0</div><div class="stat-label">Garments</div></div>
      <div class="stat-item"><div class="stat-value" id="statViewers">0</div><div class="stat-label">Viewers</div></div>
    </div>

    <!-- Buyer PiP -->
    <div class="buyer-preview">
      <div class="section-title">Buyer View</div>
      <div class="video-container" style="aspect-ratio:4/3;max-height:180px;">
        <video id="remoteVideo" autoplay playsinline></video>
      </div>
      <p class="text-sm text-muted text-center mt-sm" id="noBuyerMsg">Buyer's camera will appear once connected</p>
    </div>
  </main>

  <!-- Toast -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Modules -->
  <script src="js/socket.js"></script>
  <script src="js/webrtc.js"></script>
  <script src="js/ai.js"></script>

  <script type="module">
    import { checkAuth, logoutUser, createRoomDoc, updateRoomStatus } from './js/auth.js';

    let userData = null;
    let roomId = null;
    let localStream = null;
    let isMuted = false;
    let facingMode = 'environment';
    let garmentCount = 0;
    let sessionStart = null;
    let durationTimer = null;
    let viewers = 0;

    async function init() {
      try {
        userData = await checkAuth('seller');
        document.getElementById('sellerName').textContent = userData.displayName;

        await FVAI.loadModels((p) => {
          document.getElementById('loadingText').textContent = `${p.model}: ${p.status}`;
          document.getElementById('progressBar').style.width = p.percent + '%';
        });

        document.getElementById('loadingOverlay').classList.add('hidden');
        FVSocket.connectSocket();
        setupSocket();
        setupUI();
        startCamera();
      } catch (e) {
        console.error('Init error:', e);
      }
    }

    async function startCamera() {
      try {
        if (localStream) localStream.getTracks().forEach(t => t.stop());
        localStream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode, width: { ideal: 1280 }, height: { ideal: 720 } },
          audio: true
        });
        document.getElementById('localVideo').srcObject = localStream;
        document.getElementById('captureBtn').disabled = false;
      } catch (e) {
        console.error('Camera error:', e);
        toast('Camera not available', 'error');
        startDemoMode();
      }
    }

    function startDemoMode() {
      const c = document.createElement('canvas'); c.width = 640; c.height = 480;
      const ctx = c.getContext('2d');
      function draw() {
        ctx.fillStyle = '#1a1a2e'; ctx.fillRect(0, 0, 640, 480);
        ctx.fillStyle = '#7c6ff7'; ctx.font = '18px Syne'; ctx.textAlign = 'center';
        ctx.fillText('📷 Demo Mode', 320, 230);
        ctx.fillStyle = '#666'; ctx.font = '12px DM Sans';
        ctx.fillText('Camera not available', 320, 255);
      }
      draw(); setInterval(draw, 500);
      localStream = c.captureStream(10);
      document.getElementById('localVideo').srcObject = localStream;
      document.getElementById('captureBtn').disabled = false;
    }

    function setupSocket() {
      FVSocket.onRoomCreated(({ roomId: id }) => {
        roomId = id;
        const frontendUrl = 'https://fit-vision-sepia.vercel.app';
        document.getElementById('noRoom').classList.add('hidden');
        document.getElementById('roomInfo').classList.remove('hidden');
        document.getElementById('roomCode').textContent = id;
        document.getElementById('roomLink').textContent = `${frontendUrl}/buyer.html?room=${id}`;
        FVSocket.joinRoom(id, 'seller', userData.uid, userData.displayName);
        createRoomDoc(id, userData.uid, userData.displayName);
        sessionStart = Date.now();
        durationTimer = setInterval(updateDuration, 1000);
        toast('Room created! Share the code with your buyer.', 'success');
      });

      FVSocket.onUserJoined(({ role, userName }) => {
        if (role === 'buyer') {
          viewers++;
          document.getElementById('statViewers').textContent = viewers;
          document.getElementById('connDot').classList.add('live');
          document.getElementById('connText').textContent = `${userName || 'Buyer'} connected`;
          document.getElementById('noBuyerMsg').classList.add('hidden');
          toast(`${userName || 'Buyer'} joined!`, 'success');

          // Initiate WebRTC
          FVWebRTC.initWebRTC(localStream, (remoteStream) => {
            document.getElementById('remoteVideo').srcObject = remoteStream;
          });
          FVWebRTC.onIceCandidateGenerated((candidate) => {
            FVSocket.sendIceCandidate(roomId, candidate);
          });
          FVWebRTC.createOffer().then(offer => {
            FVSocket.sendOffer(roomId, offer);
          });
        }
      });

      FVSocket.onAnswer(async ({ answer }) => {
        await FVWebRTC.handleAnswer(answer);
      });

      FVSocket.onIceCandidate(async ({ candidate }) => {
        await FVWebRTC.handleIceCandidate(candidate);
      });

      FVSocket.onUserLeft(() => {
        viewers = Math.max(0, viewers - 1);
        document.getElementById('statViewers').textContent = viewers;
        document.getElementById('connDot').classList.remove('live');
        document.getElementById('connText').textContent = 'Buyer disconnected';
        document.getElementById('remoteVideo').srcObject = null;
        document.getElementById('noBuyerMsg').classList.remove('hidden');
        FVWebRTC.closeConnection();
        toast('Buyer left', 'error');
      });
    }

    function setupUI() {
      document.getElementById('createRoomBtn').addEventListener('click', () => {
        FVSocket.createRoom();
      });

      document.getElementById('copyCodeBtn').addEventListener('click', () => {
        navigator.clipboard.writeText(roomId).then(() => toast('Code copied!', 'success'));
      });

      document.getElementById('copyLinkBtn').addEventListener('click', () => {
        const link = `https://fit-vision-sepia.vercel.app/buyer.html?room=${roomId}`;
        navigator.clipboard.writeText(link).then(() => toast('Link copied!', 'success'));
      });

      document.getElementById('endRoomBtn').addEventListener('click', () => {
        if (roomId) {
          FVSocket.leaveRoom(roomId);
          FVWebRTC.closeConnection();
          updateRoomStatus(roomId, 'ended');
          clearInterval(durationTimer);
          document.getElementById('noRoom').classList.remove('hidden');
          document.getElementById('roomInfo').classList.add('hidden');
          roomId = null;
          toast('Room ended', '');
        }
      });

      document.getElementById('flipBtn').addEventListener('click', () => {
        facingMode = facingMode === 'environment' ? 'user' : 'environment';
        startCamera().then(() => {
          if (FVWebRTC.getPeerConnection() && localStream) {
            const videoTrack = localStream.getVideoTracks()[0];
            FVWebRTC.replaceVideoTrack(videoTrack);
          }
        });
      });

      document.getElementById('micBtn').addEventListener('click', () => {
        if (!localStream) return;
        isMuted = !isMuted;
        localStream.getAudioTracks().forEach(t => t.enabled = !isMuted);
        const btn = document.getElementById('micBtn');
        btn.textContent = isMuted ? '🔇' : '🎤';
        btn.classList.toggle('active', !isMuted);
      });

      document.getElementById('captureBtn').addEventListener('click', captureGarment);

      document.getElementById('logoutBtn').addEventListener('click', () => {
        if (roomId) { FVSocket.leaveRoom(roomId); FVWebRTC.closeConnection(); }
        logoutUser();
      });
    }

    async function captureGarment() {
      const video = document.getElementById('localVideo');
      const btn = document.getElementById('captureBtn');
      btn.disabled = true; btn.textContent = '⏳';
      toast('Capturing garment...', '');

      try {
        // Step 1: Remove background (returns PNG with transparency)
        const rawDataUrl = await FVAI.removeBackground(video);

        // Step 2: Auto-crop to isolate just the garment
        // Uses pose detection to crop shoulder-to-hip region,
        // then trims remaining transparent pixels for a clean cutout
        toast('Cropping garment...', '');
        const croppedDataUrl = await FVAI.autoCropGarment(rawDataUrl, video);

        garmentCount++;
        const name = `Garment ${garmentCount}`;

        // Add thumbnail
        document.getElementById('noCapMsg')?.remove();
        const img = document.createElement('img');
        img.src = croppedDataUrl; img.alt = name; img.title = name;
        document.getElementById('thumbStrip').appendChild(img);
        document.getElementById('capCount').textContent = garmentCount;
        document.getElementById('statGarments').textContent = garmentCount;

        // Send to buyer — MUST use PNG to preserve transparency!
        // JPEG destroys alpha channel, making garment a rectangle
        if (roomId) {
          FVSocket.sendGarmentCaptured(roomId, croppedDataUrl, name);
        }

        toast(`${name} captured & cropped!`, 'success');
      } catch (e) {
        console.error('Capture error:', e);
        toast('Capture failed', 'error');
      }

      btn.disabled = false; btn.textContent = '📸';
    }

    function updateDuration() {
      if (!sessionStart) return;
      const s = Math.floor((Date.now() - sessionStart) / 1000);
      const m = Math.floor(s / 60);
      const sec = s % 60;
      document.getElementById('statDuration').textContent = `${m}:${sec.toString().padStart(2, '0')}`;
    }

    function toast(msg, type) {
      const c = document.getElementById('toastContainer');
      const t = document.createElement('div');
      t.className = `toast ${type ? 'toast-' + type : ''}`;
      t.textContent = msg; c.appendChild(t);
      setTimeout(() => t.remove(), 3000);
    }

    init();
  </script>
</body>
</html>
